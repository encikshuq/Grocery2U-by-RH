<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery2U by RH v1.1</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <style>
    :root{--green:#16a34a;--green2:#22c55e;--dark:#0f172a;--muted:#64748b;--bg:#f1f5f9;--card:#fff;--line:#e2e8f0;--amber:#f59e0b;--red:#ef4444;--blue:#2563eb;}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#dcfce7,#e0f2fe);color:var(--dark)}
    .wrap{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}.phone{width:390px;max-width:100%;min-height:820px;background:var(--bg);border:10px solid #0f172a;border-radius:42px;overflow:hidden;box-shadow:0 30px 80px rgba(15,23,42,.35);position:relative}.status{height:28px;background:#0f172a;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}.screen{padding:18px 16px 92px}.hide{display:none!important}.brand{display:flex;gap:12px;align-items:center;margin:18px 0}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--green),#0ea5e9);display:grid;place-items:center;color:#fff;font-weight:900}.brand-logo{width:96px;height:96px;object-fit:contain;border-radius:22px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.08)}.brand-icon{width:56px;height:56px;object-fit:contain;border-radius:16px;background:#fff}.auth-brand{align-items:center}.brand h1{margin:0;font-size:25px}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 8px 20px rgba(15,23,42,.06)}.row{display:flex;gap:10px;align-items:center}.between{display:flex;justify-content:space-between;align-items:center;gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fff;font-size:14px;outline:none}textarea{min-height:76px;resize:vertical}.btn{border:0;border-radius:15px;padding:12px 14px;font-weight:800;cursor:pointer;background:var(--green);color:#fff}.btn.secondary{background:#e2e8f0;color:var(--dark)}.btn.blue{background:var(--blue)}.btn.red{background:var(--red)}.btn.amber{background:var(--amber)}.btn.ghost{background:#f8fafc;color:var(--dark);border:1px solid var(--line)}.btn.small{padding:8px 10px;border-radius:11px;font-size:12px}.tabs{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px 12px}.tab{border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:800;padding:7px 3px;border-radius:14px}.tab.active{background:#dcfce7;color:#15803d}.topbar{background:#fff;padding:14px 16px;border-bottom:1px solid var(--line)}.topbar h2{margin:0;font-size:19px}.topbar p{margin:3px 0 0;color:var(--muted);font-size:12px}.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:800;background:#eef2ff;color:#3730a3}.pill.green{background:#dcfce7;color:#166534}.pill.amber{background:#fef3c7;color:#92400e}.pill.red{background:#fee2e2;color:#991b1b}.item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.check{width:22px;height:22px;border-radius:7px;border:2px solid var(--green);margin-top:2px}.item h4{margin:0 0 3px;font-size:14px}.item p{margin:0;color:var(--muted);font-size:12px}.muted{color:var(--muted);font-size:13px}.category{font-weight:900;margin:18px 0 8px}.search{position:sticky;top:0;background:var(--bg);padding:5px 0;z-index:2}.receipt{border:2px dashed #cbd5e1;border-radius:18px;padding:18px;text-align:center;background:#f8fafc}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px}.kpi b{font-size:20px}.notice{background:#ecfeff;border:1px solid #bae6fd;color:#075985;border-radius:16px;padding:12px;font-size:13px}.list-title{font-size:17px;margin:0 0 6px}.mini{font-size:11px;color:var(--muted)}
    .home-hero{position:relative;margin:-18px -16px 14px;padding:18px 16px 20px;overflow:hidden}
    .home-hero:before{content:"";position:absolute;inset:0;background:url("assets/grocery-bg-blur.jpg") center/cover no-repeat;filter:blur(1px);transform:scale(1.03);opacity:.95}
    .home-hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(241,245,249,.92))}
    .home-hero>*{position:relative;z-index:1}.quick3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.quick-btn{min-height:82px;border-radius:18px;border:1px solid rgba(255,255,255,.78);background:rgba(255,255,255,.88);box-shadow:0 8px 20px rgba(15,23,42,.08);font-weight:900;color:var(--dark);display:flex;align-items:center;justify-content:center;text-align:center;padding:10px}.quick-btn.primary{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff}.active-card{display:flex;align-items:center;gap:12px}.round-icon{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#16a34a,#22c55e);display:grid;place-items:center;color:#fff;font-size:24px}.progress{height:8px;border-radius:99px;background:#e2e8f0;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:linear-gradient(90deg,#16a34a,#22c55e);border-radius:99px}.alert-card{background:#fff7ed;border-color:#fed7aa}.alert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}.alert-grid b{display:block;color:#ea580c;font-size:22px}.weekly-card{position:relative;overflow:hidden;border:0;background:url("assets/grocery-bg-blur.jpg") center/cover no-repeat}.weekly-card:before{content:"";position:absolute;inset:0;background:rgba(255,255,255,.70);backdrop-filter:blur(3px)}.weekly-card>*{position:relative;z-index:1}.weekly-amount{font-size:31px;font-weight:950;margin:6px 0 2px}.mini-chart{display:flex;align-items:end;gap:7px;height:58px;margin-top:10px}.mini-chart i{flex:1;border-radius:999px;background:linear-gradient(180deg,#22c55e,#86efac);min-height:14px}.freq-row{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.freq-chip{min-width:72px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center;box-shadow:0 6px 14px rgba(15,23,42,.05);font-size:12px}.freq-chip span{font-size:25px;display:block}.activity-line{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}.activity-line:last-child{border-bottom:0}
  </style>
</head>
<body>
<div class="wrap"><main class="phone">
  <div class="status"><span>9:41</span><span>Grocery2U</span><span>●●●</span></div>

  <section id="authScreen" class="screen">
    <div class="brand auth-brand"><img class="brand-logo" src="assets/logo-full.png" alt="Grocery2U by RH logo"><div><h1>Grocery2U</h1><p>by RH • Senarai barang keluarga, resit & claim.</p></div></div>
    <div class="card">
      <h3 style="margin-top:0">Login Username</h3>
      <input id="loginUsername" class="input" placeholder="Username contoh: shuq" />
      <div style="height:10px"></div>
      <input id="loginPin" class="input" placeholder="PIN contoh: 123456" type="password" />
      <div style="height:12px"></div>
      <button class="btn" style="width:100%" onclick="login()">Login</button>
      <button class="btn ghost" style="width:100%;margin-top:8px" onclick="registerDemo()">Daftar User Demo</button>
    </div>
    <div class="notice">Grocery2U by RH v1.1: Login guna Username + PIN. User login dulu, kemudian create/join family dalam app.</div>
  </section>

  <section id="appScreen" class="hide">
    <div class="topbar between"><div><h2 id="pageTitle">Home</h2><p id="subTitle">Keluarga aktif: belum dipilih</p></div><button class="btn small secondary" onclick="logout()">Logout</button></div>
    <div id="home" class="screen page"></div>
    <div id="family" class="screen page hide"></div>
    <div id="items" class="screen page hide"></div>
    <div id="lists" class="screen page hide"></div>
    <div id="receipts" class="screen page hide"></div>
    <nav class="tabs">
      <button class="tab active" onclick="showPage('home',this)">🏠<br>Home</button>
      <button class="tab" onclick="showPage('family',this)">👨‍👩‍👧<br>Family</button>
      <button class="tab" onclick="showPage('items',this)">🥬<br>Barang</button>
      <button class="tab" onclick="showPage('lists',this)">🛒<br>List</button>
      <button class="tab" onclick="showPage('receipts',this)">💰<br>Claim</button>
    </nav>
  </section>
</main></div>
<script src="supabase-config.js"></script>
<script>
const APP_NAME='Grocery2U by RH';
const seedItems=[['Sayur','Bayam','1 ikat'],['Sayur','Kangkung','1 ikat'],['Sayur','Sawi','1 ikat'],['Sayur','Kobis','1 biji'],['Sayur','Timun','3 biji'],['Sayur','Tomato','5 biji'],['Sayur','Cili Merah','200g'],['Sayur','Cili Padi','100g'],['Sayur','Bawang Merah','1kg'],['Sayur','Bawang Putih','500g'],['Ayam/Ikan/Daging','Ayam Segar','1 ekor'],['Ayam/Ikan/Daging','Daging Lembu','1kg'],['Ayam/Ikan/Daging','Ikan Kembung','1kg'],['Ayam/Ikan/Daging','Ikan Siakap','1 ekor'],['Ayam/Ikan/Daging','Udang','500g'],['Ayam/Ikan/Daging','Sotong','500g'],['Barang Kering','Beras','5kg'],['Barang Kering','Telur','30 biji'],['Barang Kering','Gula','1kg'],['Barang Kering','Garam','1 paket'],['Barang Kering','Minyak Masak','5kg'],['Barang Kering','Sardin','2 tin'],['Sos/Perasa','Kicap Jalen','1 botol'],['Sos/Perasa','Sos Cili','1 botol'],['Sos/Perasa','Sos Tiram','1 botol'],['Sos/Perasa','Serbuk Kari','1 paket'],['Tepung/Baking','Tepung Gandum','1kg'],['Tepung/Baking','Tepung Beras','1 paket'],['Tepung/Baking','Yis','1 pek'],['Minuman','Susu Dutch Lady','2 kotak'],['Minuman','Milo','1 pek'],['Minuman','Teh','1 kotak'],['Rumah','Sabun Basuh','1 botol'],['Rumah','Tisu','1 pek'],['Rumah','Pencuci Pinggan','1 botol']];
let db=JSON.parse(localStorage.getItem('dapurlist_v11')||'null')||{users:[],families:[],members:[],items:[],lists:[],receipts:[]};
let session=JSON.parse(localStorage.getItem('dapurlist_session')||'null');
function save(){localStorage.setItem('dapurlist_v11',JSON.stringify(db));}
function sid(){return Math.random().toString(36).slice(2,10)}
function registerDemo(){const u=(document.getElementById('loginUsername').value||'shuq').toLowerCase();const pin=document.getElementById('loginPin').value||'123456';let user=db.users.find(x=>x.username===u);if(!user){user={id:sid(),username:u,pin,fullName:u};db.users.push(user);seedItems.forEach(i=>db.items.push({id:sid(),ownerUserId:user.id,category:i[0],name:i[1],unit:i[2],active:true}));save()}session={userId:user.id,familyId:null};localStorage.setItem('dapurlist_session',JSON.stringify(session));boot();}
function login(){const u=document.getElementById('loginUsername').value.trim().toLowerCase();const p=document.getElementById('loginPin').value.trim();const user=db.users.find(x=>x.username===u&&x.pin===p);if(!user){alert('Username/PIN belum wujud. Tekan Daftar User Demo dahulu.');return}session={userId:user.id,familyId:db.members.find(m=>m.userId===user.id)?.familyId||null};localStorage.setItem('dapurlist_session',JSON.stringify(session));boot();}
function logout(){localStorage.removeItem('dapurlist_session');location.reload()}
function user(){return db.users.find(x=>x.id===session.userId)}function fam(){return db.families.find(x=>x.id===session.familyId)}
function boot(){if(session&&user()){authScreen.classList.add('hide');appScreen.classList.remove('hide');renderAll()}else{authScreen.classList.remove('hide');appScreen.classList.add('hide')}}
function showPage(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');pageTitle.textContent={home:'Home',family:'Family',items:'Master Barang',lists:'Senarai Beli',receipts:'Resit & Claim'}[id];}
function setFamily(id){session.familyId=id;localStorage.setItem('dapurlist_session',JSON.stringify(session));renderAll()}
function createFamily(){const name=prompt('Nama family?','Keluarga Shuq');if(!name)return;const f={id:sid(),name,createdBy:session.userId};db.families.push(f);db.members.push({id:sid(),familyId:f.id,userId:session.userId,role:'Owner',nickname:user().username,status:'active'});save();setFamily(f.id)}
function addMember(){if(!fam())return alert('Create family dahulu');const username=prompt('Username ahli keluarga? Contoh: isteri');if(!username)return;let u=db.users.find(x=>x.username===username.toLowerCase());if(!u){u={id:sid(),username:username.toLowerCase(),pin:'123456',fullName:username};db.users.push(u)}db.members.push({id:sid(),familyId:fam().id,userId:u.id,role:'Member',nickname:username,status:'active'});save();renderAll();alert('Ahli ditambah. PIN default demo: 123456')}
function joinFamily(){const code=prompt('Masukkan nama family untuk join demo:');const f=db.families.find(x=>x.name.toLowerCase()===String(code).toLowerCase());if(!f)return alert('Family tidak jumpa dalam demo local ini.');db.members.push({id:sid(),familyId:f.id,userId:session.userId,role:'Member',nickname:user().username,status:'active'});save();setFamily(f.id)}
function addItem(){const name=prompt('Nama barang?');if(!name)return;const category=prompt('Kategori?','Barang Kering')||'Lain-lain';const unit=prompt('Unit biasa?','1 unit')||'1 unit';db.items.push({id:sid(),ownerUserId:session.userId,category,name,unit,active:true});save();renderItems()}
function toggleItem(id){const it=db.items.find(x=>x.id===id);it.active=!it.active;save();renderItems()}
function editItem(id){const it=db.items.find(x=>x.id===id);it.name=prompt('Nama barang',it.name)||it.name;it.category=prompt('Kategori',it.category)||it.category;it.unit=prompt('Unit',it.unit)||it.unit;save();renderItems()}
function createList(){if(!fam())return alert('Pilih/create family dahulu');const title=prompt('Tajuk senarai?','Barang dapur hari ini');if(!title)return;const members=db.members.filter(m=>m.familyId===fam().id);const buyer=members[0]?.userId;db.lists.push({id:sid(),familyId:fam().id,title,createdBy:session.userId,assignedTo:buyer,status:'draft',items:[],createdAt:new Date().toISOString()});save();renderLists()}
function addToList(listId,itemId){const l=db.lists.find(x=>x.id===listId);const it=db.items.find(x=>x.id===itemId);l.items.push({id:sid(),itemId:it.id,name:it.name,category:it.category,unit:it.unit,status:'requested',note:'',replacement:''});save();renderLists()}
function setStatus(listId,rowId,status){const row=db.lists.find(x=>x.id===listId).items.find(i=>i.id===rowId);row.status=status;if(status==='replaced')row.replacement=prompt('Ganti dengan barang apa?',row.replacement||'')||'';save();renderLists();renderHome()}
function sendList(id){const l=db.lists.find(x=>x.id===id);l.status='sent';save();renderLists();renderHome()}
function completeList(id){const l=db.lists.find(x=>x.id===id);l.status='completed';save();renderLists();renderHome()}
function uploadReceipt(){if(!fam())return alert('Pilih family dahulu');const amount=prompt('Jumlah resit RM?','50.00');if(!amount)return;const payer=session.userId;db.receipts.push({id:sid(),familyId:fam().id,amount:Number(amount),payer,claimStatus:'unpaid',date:new Date().toISOString(),note:'Resit demo disimpan sebagai rekod. Versi production upload gambar ke Supabase Storage.'});save();renderReceipts();renderHome()}
function markPaid(id){db.receipts.find(r=>r.id===id).claimStatus='paid';save();renderReceipts();renderHome()}
function renderAll(){subTitle.textContent='Login: '+user().username+(fam()?(' • '+fam().name):' • belum pilih family');renderHome();renderFamily();renderItems();renderLists();renderReceipts()}
function renderHome(){
const activeLists=db.lists.filter(l=>l.familyId===session.familyId&&l.status!=='completed');
const current=activeLists[0];
const bought=current?current.items.filter(i=>i.status==='bought').length:0;
const total=current?current.items.length:0;
const unavailable=activeLists.reduce((s,l)=>s+l.items.filter(i=>i.status==='unavailable').length,0);
const replaced=activeLists.reduce((s,l)=>s+l.items.filter(i=>i.status==='replaced').length,0);
const now=new Date();
const day=(now.getDay()+6)%7;
const monday=new Date(now);monday.setDate(now.getDate()-day);
const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
const weeklyReceipts=db.receipts.filter(r=>r.familyId===session.familyId&&new Date(r.date)>=monday&&new Date(r.date)<=new Date(sunday.getFullYear(),sunday.getMonth(),sunday.getDate(),23,59,59));
const weeklyTotal=weeklyReceipts.reduce((s,r)=>s+r.amount,0);
const totalClaim=db.receipts.filter(r=>r.familyId===session.familyId&&r.claimStatus==='unpaid').reduce((s,r)=>s+r.amount,0);
const pct=total?Math.round((bought/total)*100):0;
const fDate=d=>d.toLocaleDateString('ms-MY',{day:'numeric',month:'short'});
home.innerHTML=`
<div class="home-hero">
  <div class="brand"><img class="brand-icon" src="assets/icons/icon-96.png" alt="Grocery2U icon"><div><h1>Hi, ${user().username} 👋</h1><p>${fam()?fam().name:'Create atau join family dahulu.'}</p></div></div>
  <div class="quick3">
    <button class="quick-btn primary" onclick="createList()">+ Buat<br>Senarai</button>
    <button class="quick-btn" onclick="uploadReceipt()">📷<br>Upload Resit</button>
    <button class="quick-btn" onclick="addItem()">🥬<br>Tambah Barang</button>
  </div>
</div>
<div class="between" style="margin:2px 0 8px"><h3 style="margin:0">Senarai Aktif</h3><span class="mini">Lihat semua ›</span></div>
<div class="card active-card">
  <div class="round-icon">🛒</div>
  <div style="flex:1">
    <div class="between"><h3 class="list-title">${current?current.title:'Belum ada senarai aktif'}</h3><span class="pill green">${current?(current.status==='sent'?'Sedang membeli':current.status):'Kosong'}</span></div>
    <p class="muted">${current?'Pembeli: '+(db.users.find(u=>u.id===current.assignedTo)?.username||'belum assign'):'Tekan + Buat Senarai untuk mula.'}</p>
    <div class="progress"><span style="width:${pct}%"></span></div>
    <p class="muted">${bought} / ${total} barang dibeli</p>
  </div>
</div>
<div class="card alert-card">
  <div class="alert-grid">
    <div><b>${unavailable}</b><span class="mini">barang tiada</span></div>
    <div><b>${replaced}</b><span class="mini">barang diganti</span></div>
    <div><b>${db.receipts.filter(r=>r.familyId===session.familyId&&r.claimStatus==='unpaid').length}</b><span class="mini">claim belum selesai</span></div>
  </div>
</div>
<div class="card weekly-card">
  <div class="between"><div><h3 style="margin:0">Belanja Mingguan</h3><p class="muted">${fDate(monday)} – ${fDate(sunday)}</p></div><span class="pill green">${weeklyReceipts.length} resit</span></div>
  <div class="weekly-amount">RM ${weeklyTotal.toFixed(2)}</div>
  <p class="muted">Jumlah perbelanjaan minggu ini</p>
  <div class="mini-chart"><i style="height:28%"></i><i style="height:45%"></i><i style="height:38%"></i><i style="height:62%"></i><i style="height:54%"></i><i style="height:78%"></i><i style="height:88%"></i></div>
  <div class="between" style="margin-top:10px"><span class="mini">Isn Sel Rab Kha Jum Sab Aha</span><b style="color:#15803d">Claim: RM${totalClaim.toFixed(2)}</b></div>
</div>
<div class="between" style="margin:16px 0 8px"><h3 style="margin:0">Barang Kerap Dibeli</h3><span class="mini">Lihat semua ›</span></div>
<div class="freq-row"><div class="freq-chip"><span>🥚</span>Telur</div><div class="freq-chip"><span>🍗</span>Ayam</div><div class="freq-chip"><span>🧅</span>Bawang</div><div class="freq-chip"><span>🥛</span>Susu</div><div class="freq-chip"><span>🍚</span>Beras</div></div>
<div class="card"><h3 style="margin-top:0">Aktiviti Terkini</h3><div class="activity-line"><span>Isteri upload resit</span><span class="mini">10:28</span></div><div class="activity-line"><span>Ayam ditanda dah beli</span><span class="mini">10:15</span></div><div class="activity-line"><span>Kicap diganti dengan jenama lain</span><span class="mini">09:47</span></div></div>`}
function renderFamily(){const myMemberships=db.members.filter(m=>m.userId===session.userId);const mem=fam()?db.members.filter(m=>m.familyId===fam().id):[];family.innerHTML=`<div class="card"><h3 style="margin-top:0">Family Saya</h3>${myMemberships.map(m=>{const f=db.families.find(x=>x.id===m.familyId);return `<div class="between item"><div><h4>${f.name}</h4><p>${m.role}</p></div><button class="btn small" onclick="setFamily('${f.id}')">Pilih</button></div>`}).join('')||'<p class="muted">Belum ada family.</p>'}<button class="btn" onclick="createFamily()">+ Create Family</button><button class="btn ghost" onclick="joinFamily()" style="margin-left:8px">Join Family</button></div><div class="card"><h3 style="margin-top:0">Ahli Family Aktif</h3>${mem.map(m=>`<div class="item"><div class="logo" style="width:34px;height:34px;border-radius:12px;font-size:12px">${m.nickname[0].toUpperCase()}</div><div><h4>${m.nickname}</h4><p>${m.role} • username: ${db.users.find(u=>u.id===m.userId)?.username}</p></div></div>`).join('')||'<p class="muted">Pilih family dahulu.</p>'}<button class="btn secondary" onclick="addMember()">+ Add Family Member</button></div>`}
function renderItems(){const groups={};db.items.filter(i=>i.ownerUserId===session.userId).forEach(i=>(groups[i.category]??=[]).push(i));items.innerHTML=`<div class="search"><input class="input" placeholder="Cari barang dapur..." oninput="renderItemsFiltered(this.value)"></div><button class="btn" onclick="addItem()">+ Tambah Barang</button><div id="itemList">${Object.keys(groups).map(cat=>`<div class="category">${cat}</div><div class="card">${groups[cat].map(i=>`<div class="between item"><div><h4>${i.name} ${i.active?'':'<span class="pill red">Off</span>'}</h4><p>${i.unit}</p></div><div><button class="btn small secondary" onclick="editItem('${i.id}')">Edit</button> <button class="btn small ${i.active?'red':'green'}" onclick="toggleItem('${i.id}')">${i.active?'Off':'On'}</button></div></div>`).join('')}</div>`).join('')}</div>`}
function renderItemsFiltered(q){q=q.toLowerCase();document.querySelectorAll('#itemList .item').forEach(el=>el.style.display=el.innerText.toLowerCase().includes(q)?'flex':'none')}
function renderLists(){const familyLists=db.lists.filter(l=>l.familyId===session.familyId);const activeItems=db.items.filter(i=>i.ownerUserId===session.userId&&i.active);lists.innerHTML=`<button class="btn" onclick="createList()">+ Buat Senarai Baru</button>${familyLists.map(l=>`<div class="card"><div class="between"><div><h3 class="list-title">${l.title}</h3><span class="pill ${l.status==='completed'?'green':'amber'}">${l.status}</span></div><div><button class="btn small blue" onclick="sendList('${l.id}')">Hantar</button> <button class="btn small" onclick="completeList('${l.id}')">Selesai</button></div></div><div class="category">Tambah barang</div><select onchange="if(this.value)addToList('${l.id}',this.value);this.value=''"><option value="">Pilih barang...</option>${activeItems.map(i=>`<option value="${i.id}">${i.category} - ${i.name}</option>`).join('')}</select><div class="category">Barang diminta</div>${l.items.map(r=>`<div class="item"><div><h4>${r.name}</h4><p>${r.unit} • ${r.status}${r.replacement?' → '+r.replacement:''}</p><div style="margin-top:8px"><button class="btn small" onclick="setStatus('${l.id}','${r.id}','bought')">Dah Beli</button> <button class="btn small red" onclick="setStatus('${l.id}','${r.id}','unavailable')">Tiada</button> <button class="btn small amber" onclick="setStatus('${l.id}','${r.id}','replaced')">Ganti</button></div></div></div>`).join('')||'<p class="muted">Belum tambah barang.</p>'}</div>`).join('')||'<div class="card"><p class="muted">Belum ada senarai.</p></div>'}`}
function renderReceipts(){const rec=db.receipts.filter(r=>r.familyId===session.familyId);receipts.innerHTML=`<div class="receipt"><b>Upload Resit</b><p class="muted">Demo ini simpan jumlah resit. Versi live simpan gambar resit di Supabase Storage.</p><button class="btn blue" onclick="uploadReceipt()">+ Ambil/Upload Resit</button></div>${rec.map(r=>`<div class="card"><div class="between"><div><h3 class="list-title">RM${r.amount.toFixed(2)}</h3><p class="muted">${new Date(r.date).toLocaleDateString('ms-MY')} • dibayar oleh ${db.users.find(u=>u.id===r.payer)?.username}</p></div><span class="pill ${r.claimStatus==='paid'?'green':'amber'}">${r.claimStatus==='paid'?'Selesai':'Belum Claim'}</span></div><p class="muted">${r.note}</p>${r.claimStatus==='unpaid'?`<button class="btn" onclick="markPaid('${r.id}')">Mark Paid</button>`:''}</div>`).join('')||'<div class="card"><p class="muted">Belum ada resit.</p></div>'}`}
boot();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}</script>
</body>
</html>
